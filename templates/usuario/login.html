{% load i18n %} {% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% trans "Inicio de sesión" %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{% static 'usuario/css/style.css' %}" />
    <link rel="icon" href="{% static 'usuario/img/logo.png' %}" />
  </head>
  <body>
    <div class="auth-user">
      <img
        src="{% static 'usuario/img/logo.png' %}"
        alt="Logo de TorneoPro"
        class="topimg"
      />
      <h1>TorneoPro</h1>
      <h2>{% trans "Inicio de sesión" %}</h2>

      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {{ form.as_p }}

        <a href="{% url 'usuario:registro' %}">{% trans "Regístrate" %}</a>

        <button type="submit" class="btn btn-primary">{% trans "Iniciar sesión" %}</button>
        
      </form>
    </div>
  </body>
</html>
